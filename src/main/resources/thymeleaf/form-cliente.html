<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 th:text="${cliente.id != null} ? 'Editar Cliente' : 'Novo Cliente'"></h2>

<form th:action="${cliente.id != null} ? '/clientes/atualizar/' + ${cliente.id} : '/clientes/salvar'" method="post" class="mt-4">

    <input type="hidden" name="id" th:value="${cliente.id}">

    <div class="mb-3">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" id="nome" name="nome"
               th:value="${cliente.nome}"
               class="form-control"
               th:classappend="${erros != null and erros.containsKey('nome')} ? 'is-invalid' : ''"
               th:style="${erros != null and erros.containsKey('nome')} ? 'background-color: #fff0f0;' : ''">
        <div class="invalid-feedback" th:if="${erros != null and erros.containsKey('nome')}" th:text="${erros.get('nome')}"></div>
    </div>

    <div class="mb-3">
        <label for="cpf" class="form-label">CPF</label>
        <input type="text" id="cpf" name="cpf"
               th:value="${cliente.cpf}"
               class="form-control"
               maxlength="14"
               placeholder="000.000.000-00"
               th:classappend="${erros != null and erros.containsKey('cpf')} ? 'is-invalid' : ''"
               th:style="${erros != null and erros.containsKey('cpf')} ? 'background-color: #fff0f0;' : ''">
        <div class="invalid-feedback" th:if="${erros != null and erros.containsKey('cpf')}" th:text="${erros.get('cpf')}"></div>
    </div>

    <div class="mb-3">
        <label for="telefone" class="form-label">Telefone</label>
        <input type="text" id="telefone" name="telefone"
               th:value="${cliente.telefone}"
               class="form-control"
               maxlength="15"
               placeholder="(00) 00000-0000"
               th:classappend="${erros != null and erros.containsKey('telefone')} ? 'is-invalid' : ''"
               th:style="${erros != null and erros.containsKey('telefone')} ? 'background-color: #fff0f0;' : ''">
        <div class="invalid-feedback" th:if="${erros != null and erros.containsKey('telefone')}" th:text="${erros.get('telefone')}"></div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-light">
            <strong>Endereço</strong>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label for="cep" class="form-label">Buscar Endereço (CEP)</label>
                <input type="text" id="cep" class="form-control border-primary" placeholder="Digite o CEP e dê Enter ou clique fora..." maxlength="9">
            </div>

            <div id="dados-endereco" style="display: none; background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 15px;">
                <div class="row">
                    <div class="col-md-8 mb-2">
                        <label class="form-label">Rua</label>
                        <input type="text" id="rua" class="form-control" readonly>
                    </div>
                    <div class="col-md-4 mb-2">
                        <label class="form-label text-primary fw-bold">Número <span class="text-danger">*</span></label>
                        <input type="text" id="numero" class="form-control border-primary" placeholder="Ex: 123">
                    </div>
                    <div class="col-md-6 mb-2">
                        <label class="form-label">Bairro</label>
                        <input type="text" id="bairro" class="form-control" readonly>
                    </div>
                    <div class="col-md-4 mb-2">
                        <label class="form-label">Cidade</label>
                        <input type="text" id="cidade" class="form-control" readonly>
                    </div>
                    <div class="col-md-2 mb-2">
                        <label class="form-label">UF</label>
                        <input type="text" id="uf" class="form-control" readonly>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="endereco" class="form-label">Endereço Completo Salvo</label>
                <input type="text" id="endereco" name="endereco"
                       th:value="${cliente.endereco}"
                       class="form-control"
                       th:readonly="${cliente.id == null}"
                       th:classappend="${erros != null and erros.containsKey('endereco')} ? 'is-invalid' : ''"
                       th:style="${erros != null and erros.containsKey('endereco')} ? 'background-color: #fff0f0;' : ''">
                <div class="invalid-feedback" th:if="${erros != null and erros.containsKey('endereco')}" th:text="${erros.get('endereco')}"></div>
                <small class="text-muted" th:if="${cliente.id != null}">* Como você está editando um cliente antigo, pode alterar o endereço diretamente nesta caixa.</small>
            </div>
        </div>
    </div>
    <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <button type="button" id="btn-abrir-cancelar" class="btn btn-secondary">Cancelar</button>
    </div>
</form>

<div id="modal-cancelar" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 8px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <p style="font-size: 18px; margin-bottom: 25px;">
            ⚠️ Você realmente deseja <span style="color: red; font-weight: bold; text-decoration: underline;">cancelar</span>? ⚠️
        </p>
        <div style="display: flex; justify-content: space-around;">
            <button type="button" id="btn-ficar" class="btn btn-secondary" style="cursor: pointer;">Não, continuar</button>
            <a href="/clientes" class="btn btn-danger" style="background-color: red; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px;">Sim, sair</a>
        </div>
    </div>
</div>

<script th:if="${alertaErro}" th:inline="javascript">
    alert(/*[[${alertaErro}]]*/ 'Ocorreu um problema.');
</script>

<script>
    // 1. MÁSCARAS EM TEMPO REAL
    document.getElementById('cpf').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
        e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' : '') + x[3] + (x[4] ? '-' + x[4] : '');
    });

    document.getElementById('telefone').addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    const inputCep = document.getElementById('cep');
    inputCep.addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,5})(\d{0,3})/);
        e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2];
    });

    // 2. BUSCA DE CEP (API VIACEP) COM TRAVA DE SEGURANÇA
    const divDadosEndereco = document.getElementById('dados-endereco');
    const inputEnderecoReal = document.getElementById('endereco');
    const inputNumero = document.getElementById('numero');

    // IMPEDE O ENTER DE SUBMITAR O FORMULÁRIO POR ACIDENTE
    inputCep.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // Mata o envio da página!
            executarBuscaCep();
        }
    });

    // Executa a busca também se o usuário clicar fora do campo
    inputCep.addEventListener('change', function() {
        executarBuscaCep();
    });

    async function executarBuscaCep() {
        let cep = inputCep.value.replace(/\D/g, '');

        // Se o CEP tiver menos de 8 dígitos, não faz nada ou avisa
        if (cep.length !== 8) {
            if (cep.length > 0) {
                alert("CEP incompleto! Digite os 8 números.");
                limparEEsconderEndereco();
            }
            return;
        }

        try {
            let response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            let data = await response.json();

            if (!data.erro) {
                // SE ACHOU O CEP: Preenche, mostra os inputs e foca no Número
                document.getElementById('rua').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
                document.getElementById('uf').value = data.uf;

                divDadosEndereco.style.display = 'block'; // Mostra a caixinha
                inputNumero.focus();
                atualizarEnderecoReal();
            } else {
                // SE O CEP NÃO EXISTIR: Avisa e garante que tudo continue oculto
                alert("CEP não encontrado! Verifique o número digitado.");
                limparEEsconderEndereco();
            }
        } catch (err) {
            console.error("Erro ao buscar o CEP", err);
            alert("Erro ao conectar com o serviço de CEP. Tente novamente.");
            limparEEsconderEndereco();
        }
    }

    // Função auxiliar para limpar tudo e sumir com os inputs extras se der erro
    function limparEEsconderEndereco() {
        document.getElementById('rua').value = '';
        document.getElementById('bairro').value = '';
        document.getElementById('cidade').value = '';
        document.getElementById('uf').value = '';
        inputNumero.value = '';
        inputEnderecoReal.value = '';
        divDadosEndereco.style.display = 'none'; // Some da tela!
    }

    // 3. JUNTAR TUDO NO CAMPO ORIGINAL PRO JAVA LER
    inputNumero.addEventListener('input', atualizarEnderecoReal);

    function atualizarEnderecoReal() {
        let rua = document.getElementById('rua').value;
        let numero = document.getElementById('numero').value || 'S/N';
        let bairro = document.getElementById('bairro').value;
        let cidade = document.getElementById('cidade').value;
        let uf = document.getElementById('uf').value;
        let cep = document.getElementById('cep').value;

        if (rua || bairro || cidade) {
            inputEnderecoReal.value = `${rua}, ${numero} - ${bairro}, ${cidade} - ${uf} (CEP: ${cep})`;
        } else {
            inputEnderecoReal.value = '';
        }
    }

    // --- LÓGICA DO BOTÃO CANCELAR E DO POP-UP CUSTOMIZADO ---
    const modalCancelar = document.getElementById('modal-cancelar');
    const btnAbrirCancelar = document.getElementById('btn-abrir-cancelar');
    const btnFicar = document.getElementById('btn-ficar');

    // Mostra o pop-up ao clicar em Cancelar
    btnAbrirCancelar.addEventListener('click', function() {
        modalCancelar.style.display = 'flex';
    });

    // Esconde o pop-up se o usuário desistir de cancelar
    btnFicar.addEventListener('click', function() {
        modalCancelar.style.display = 'none';
    });

    // --- PROTEÇÃO DA SETINHA DO NAVEGADOR ---
    let formularioFoiAlterado = false;

    // Vigia qualquer alteração, clique ou digitação nos campos
    document.querySelectorAll('input').forEach(campo => {
        campo.addEventListener('input', () => { formularioFoiAlterado = true; });
        campo.addEventListener('change', () => { formularioFoiAlterado = true; });
    });

    window.addEventListener('beforeunload', function (e) {
        if (formularioFoiAlterado) {
            // As três linhas abaixo são necessárias para cobrir diferentes navegadores
            e.preventDefault();
            e.returnValue = 'Existem alterações não salvas.';
            return 'Existem alterações não salvas.';
        }
    });

    // Desliga a proteção se ele clicar em "Salvar" para o formulário poder ser enviado
    document.querySelector('form').addEventListener('submit', function() {
        formularioFoiAlterado = false;
    });
</script>
</body>
</html>
